{% extends "base.html" %}

{% block title %}效果评估 | AI 个性化学习多智能体系统{% endblock %}

{% block content %}
<section class="row g-4">
    <div class="col-lg-4">
        <div class="glass-panel h-100">
            <p class="section-kicker">学习评估</p>
            <h1 class="h3 mb-3">生成效果评估报告</h1>
            <form id="evaluateForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label">选择用户</label>
                    <select class="form-select" name="user_id" required>
                        <option value="">请选择</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <button class="btn btn-brand" type="submit">生成报告</button>
                </div>
            </form>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="glass-panel h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <p class="section-kicker">评估结果</p>
                    <h2 class="h4 mb-1">得分、摘要与优化动作</h2>
                </div>
                <button id="loadReportsBtn" class="btn btn-outline-light btn-sm">刷新报告</button>
            </div>
            <div id="evaluateResult" class="stack-list"></div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
window.pageConfig = { page: "evaluate" };
</script>
{% endblock %}
